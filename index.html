<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการทรัพย์ Meesuk Siri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div class="max-w-7xl mx-auto p-4 md:p-8">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-blue-900 tracking-tight">🏠 Meesuk Siri Property</h1>
                <p class="text-slate-500 mt-1">ระบบฐานข้อมูลจัดการทรัพย์อัจฉริยะ</p>
            </div>
            <div id="loader" class="bg-blue-100 text-blue-700 px-4 py-2 rounded-full text-sm font-bold animate-pulse">
                กำลังดึงข้อมูลล่าสุดจาก Excel...
            </div>
        </header>

        <div id="propertyGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[2.5rem] max-w-2xl w-full p-8 shadow-2xl overflow-y-auto max-h-[90vh] border border-white/20">
            <div class="flex justify-between items-center mb-8 border-b pb-4">
                <h2 class="text-2xl font-bold text-slate-800">📝 รายละเอียดและแก้ไขข้อมูล</h2>
                <button onclick="closeModal()" class="text-slate-400 hover:text-red-500 transition text-2xl">✕</button>
            </div>
            
            <div id="modalFields" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                </div>

            <div class="mt-10 flex flex-col md:flex-row gap-4">
                <button onclick="saveData()" id="saveBtn" class="flex-[2] bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-blue-200 transition-all active:scale-95">บันทึกข้อมูลลง Excel</button>
                <button onclick="closeModal()" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 py-4 rounded-2xl font-bold transition">ยกเลิก</button>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxd-ro_qmS8oIYEbbMCTAKEiqFE7egityYCV74FF361yvpzzxvLIzicklAJ6fPyoUsIz/exec";
        let allData = [];
        let currentRowIndex = null;

        // รายชื่อหัวตารางทั้งหมดที่คุณส่งมา
        const allColumns = [
            'ลำดับที่', 'รหัสทรัพย์', 'ชื่อทรัพย์', 'ประเภททรัพย์', 'สถานะ', 
            'ชื่อโครงการ', 'ชื่อเจ้าของ', 'ประเภท', 'จุดเด่น', 
            'ไร่', 'งาน', 'ตร.วา', 'ที่ดิน ต่อไร่', 'ราคาขาย',
            'ตำบล', 'อำเภอ', 'จังหวัด', 'ที่อยู่', 'รายละเอียดทรัพย์'
        ];

        async function init() {
            try {
                const res = await fetch(WEB_APP_URL);
                allData = await res.json();
                render();
            } catch (e) {
                document.getElementById('loader').innerText = "❌ การเชื่อมต่อผิดพลาด";
            }
        }

        function render() {
            document.getElementById('loader').classList.add('hidden');
            const grid = document.getElementById('propertyGrid');
            
            grid.innerHTML = allData.map((item, index) => `
                <div class="bg-white p-7 rounded-[2rem] shadow-sm border border-slate-100 hover:shadow-2xl hover:-translate-y-1 transition-all duration-300 cursor-pointer group" onclick="openModal(${index})">
                    <div class="flex justify-between items-start mb-5">
                        <span class="bg-emerald-50 text-emerald-600 px-3 py-1 rounded-lg text-xs font-bold uppercase tracking-wider border border-emerald-100">
                            ${item['สถานะ'] || 'พร้อมขาย'}
                        </span>
                        <div class="text-right">
                            <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">ราคาขาย</p>
                            <p class="text-blue-700 font-extrabold text-xl">${item['ราคาขาย'] || '0'}.-</p>
                        </div>
                    </div>
                    
                    <h3 class="font-bold text-slate-800 text-xl mb-2 group-hover:text-blue-600 transition-colors">${item['ชื่อทรัพย์'] || 'ไม่มีชื่อ'}</h3>
                    <p class="text-sm text-slate-400 mb-6 flex items-center gap-2">📍 ${item['ตำบล'] || ''} ${item['อำเภอ'] || ''} ${item['จังหวัด'] || ''}</p>
                    
                    <div class="grid grid-cols-3 gap-2 py-4 border-y border-slate-50 mb-6 text-center">
                        <div><p class="text-[10px] text-slate-400 font-bold uppercase">ไร่</p><p class="font-bold text-slate-700">${item['ไร่'] || '0'}</p></div>
                        <div><p class="text-[10px] text-slate-400 font-bold uppercase">งาน</p><p class="font-bold text-slate-700">${item['งาน'] || '0'}</p></div>
                        <div><p class="text-[10px] text-slate-400 font-bold uppercase">ตร.ว.</p><p class="font-bold text-slate-700">${item['ตร.วา'] || '0'}</p></div>
                    </div>

                    <div class="flex justify-between items-center">
                        <span class="text-xs font-medium text-slate-400">ID: ${item['รหัสทรัพย์'] || '-'}</span>
                        <span class="text-blue-500 text-sm font-bold group-hover:translate-x-1 transition-transform inline-flex items-center gap-1">
                            จัดการข้อมูล <span class="text-lg">→</span>
                        </span>
                    </div>
                </div>
            `).join('');
        }

        function openModal(index) {
            const data = allData[index];
            currentRowIndex = data.row_index;
            const fieldsContainer = document.getElementById('modalFields');
            
            fieldsContainer.innerHTML = allColumns.map(col => `
                <div class="${col === 'รายละเอียดทรัพย์' || col === 'ที่อยู่' ? 'md:col-span-2' : ''}">
                    <label class="block text-[10px] font-bold text-slate-400 mb-2 uppercase tracking-widest">${col}</label>
                    <input type="text" id="input_${col}" value="${data[col] || ''}" 
                           class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all text-slate-700">
                </div>
            `).join('');
            
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        async function saveData() {
            const btn = document.getElementById('saveBtn');
            const updates = {};
            
            allColumns.forEach(col => {
                updates[col] = document.getElementById("input_" + col).value;
            });

            btn.innerText = "⏳ กำลังบันทึกข้อมูล...";
            btn.disabled = true;

            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ row_index: currentRowIndex, updates: updates })
                });
                alert("✅ บันทึกข้อมูลลง Excel สำเร็จ!");
                closeModal();
                init(); // โหลดข้อมูลใหม่
            } catch (e) {
                alert("❌ บันทึกไม่สำเร็จ กรุณาลองใหม่");
            } finally {
                btn.innerText = "บันทึกข้อมูลลง Excel";
                btn.disabled = false;
            }
        }

        init();
    </script>
</body>
</html>
