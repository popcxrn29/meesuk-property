<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><title>Meesuk Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8 bg-white p-6 rounded-3xl shadow-sm">
            <h1 class="text-2xl font-bold text-blue-900">🏠 Meesuk Property Admin</h1>
            <div id="loader" class="text-blue-500 font-bold animate-pulse">กำลังโหลด...</div>
        </header>
        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[2.5rem] max-w-lg w-full p-8 shadow-2xl overflow-y-auto max-h-[90vh]">
            <h2 class="text-xl font-bold mb-6 border-b pb-4">แก้ไขข้อมูลทรัพย์</h2>
            <div id="fields" class="space-y-4"></div>
            <div class="mt-8 flex gap-3">
                <button id="saveBtn" onclick="save()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 transition">บันทึกข้อมูล</button>
                <button onclick="closeM()" class="flex-1 bg-gray-100 py-4 rounded-2xl font-bold">ปิด</button>
            </div>
        </div>
    </div>

    <script>
        const URL = "ใส่_URL_เว็บแอป_ของคุณที่นี่"; 
        let data = []; let currentIdx = null;

        async function load() {
            const res = await fetch(URL); data = await res.json();
            document.getElementById('loader').classList.add('hidden');
            render();
        }

        function render() {
            document.getElementById('grid').innerHTML = data.map((item, i) => {
                // ระบบหาชื่อและราคาแบบยืดหยุ่น (เจอคำว่า 'ชื่อ' หรือ 'ราคา' ตรงไหน เอาตรงนั้นมาโชว์)
                const name = item['ชื่อทรัพย์'] || item['ชื่อ'] || 'ไม่มีชื่อ';
                const price = item['ราคาขายรวม'] || item['ราคา'] || '0';
                return `
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 hover:border-blue-300 transition-all cursor-pointer" onclick="openM(${i})">
                    <div class="flex justify-between mb-4">
                        <span class="text-blue-600 font-bold text-lg">${price}.-</span>
                    </div>
                    <h3 class="font-bold text-slate-800 mb-2">${name}</h3>
                    <div class="text-xs text-slate-400 font-bold uppercase tracking-tighter">คลิกเพื่อดูรายละเอียด/แก้แคปชั่น</div>
                </div>`;
            }).join('');
        }

        function openM(i) {
            currentIdx = data[i].row_index;
            const keys = Object.keys(data[i]).filter(k => k !== 'row_index');
            document.getElementById('fields').innerHTML = keys.map(k => `
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">${k}</label>
                    ${k.includes('แคปชั่น') ? 
                        `<textarea id="in_${k}" rows="5" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">${data[i][k] || ''}</textarea>` :
                        `<input id="in_${k}" type="text" value="${data[i][k] || ''}" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">`
                    }
                </div>`).join('');
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeM() { document.getElementById('modal').classList.add('hidden'); }

        async function save() {
            const btn = document.getElementById('saveBtn'); btn.innerText = "กำลังบันทึก..."; btn.disabled = true;
            const updates = {};
            document.querySelectorAll('[id^="in_"]').forEach(el => { updates[el.id.replace('in_', '')] = el.value; });
            
            await fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ row_index: currentIdx, updates }) });
            alert("บันทึกสำเร็จ!"); location.reload();
        }
        load();
    </script>
</body>
</html>
