<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meesuk Siri Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-gray-50">
    <div class="max-w-6xl mx-auto p-4">
        <header class="flex justify-between items-center py-6 border-b mb-8">
            <h1 class="text-2xl font-bold text-blue-900">🏠 Meesuk Siri Admin</h1>
            <div id="loader" class="text-blue-500">กำลังดึงข้อมูลจาก Excel...</div>
        </header>

        <div id="propertyGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl max-w-lg w-full p-8 shadow-2xl overflow-y-auto max-h-[90vh]">
            <h2 class="text-xl font-bold mb-6 text-gray-800 border-b pb-4">รายละเอียดและแก้ไขข้อมูล</h2>
            <div id="modalFields" class="space-y-4"></div>
            <div class="mt-8 flex gap-3">
                <button onclick="saveData()" class="flex-1 bg-blue-600 text-white py-3 rounded-2xl font-bold hover:bg-blue-700 transition">บันทึกข้อมูล</button>
                <button onclick="closeModal()" class="flex-1 bg-gray-100 text-gray-600 py-3 rounded-2xl font-bold hover:bg-gray-200 transition">ปิด</button>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "วาง_URL_เว็บแอป_ของคุณที่นี่"; // *** ก๊อปปี้ลิงก์จาก Google มาวางตรงนี้ ***
        let allData = [];
        let currentRow = null;

        async function init() {
            try {
                const res = await fetch(WEB_APP_URL);
                allData = await res.json();
                render();
            } catch (e) { document.getElementById('loader').innerText = "เชื่อมต่อล้มเหลว"; }
        }

        function render() {
            document.getElementById('loader').classList.add('hidden');
            const grid = document.getElementById('propertyGrid');
            grid.innerHTML = allData.map((item, index) => `
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 hover:shadow-xl transition cursor-pointer group" onclick="openModal(${index})">
                    <div class="flex justify-between mb-4">
                        <span class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-xs font-bold">${item['ประเภททรัพย์'] || 'ไม่ระบุ'}</span>
                        <span class="text-blue-700 font-bold">${item['ราคาขายรวม'] || '0'}.-</span>
                    </div>
                    <h3 class="font-bold text-gray-800 text-lg mb-2">${item['ชื่อทรัพย์'] || 'ไม่มีชื่อ'}</h3>
                    <p class="text-sm text-gray-500 italic">📍 ${item['อำเภอ']}, ${item['จังหวัด']}</p>
                    <div class="mt-4 pt-4 border-t flex justify-between text-xs text-gray-400 font-light">
                        <span>สถานะ: ${item['สถานะ'] || '-'}</span>
                        <span class="text-blue-500 font-bold group-hover:underline">ดูรายละเอียด/แก้ไข</span>
                    </div>
                </div>
            `).join('');
        }

        function openModal(index) {
            const data = allData[index];
            currentRow = data.row_index;
            const fields = document.getElementById('modalFields');
            
            // เลือกคอลัมน์ที่ต้องการให้แก้ไขได้ (แก้ชื่อให้ตรงกับ Excel ของคุณ)
            const editableCols = ['ชื่อทรัพย์', 'ประเภททรัพย์', 'ราคาขายรวม', 'สถานะ', 'อำเภอ', 'จังหวัด'];
            
            fields.innerHTML = editableCols.map(col => `
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1 uppercase">${col}</label>
                    <input type="text" id="input_${col}" value="${data[col] || ''}" 
                           class="w-full p-3 bg-gray-50 border border-gray-100 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            `).join('');
            
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        async function saveData() {
            const updates = {};
            const editableCols = ['ชื่อทรัพย์', 'ประเภททรัพย์', 'ราคาขายรวม', 'สถานะ', 'อำเภอ', 'จังหวัด'];
            editableCols.forEach(col => {
                updates[col] = document.getElementById(`input_${col}`).value;
            });

            const btn = event.target;
            btn.innerText = "กำลังบันทึก...";
            btn.disabled = true;

            await fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify({ row_index: currentRow, updates: updates })
            });

            alert("บันทึกข้อมูลเรียบร้อย!");
            closeModal();
            init(); // รีโหลดข้อมูลใหม่จาก Excel
        }

        init();
    </script>
</body>
</html>
