<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meesuk Property Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-slate-50">
    <div class="max-w-6xl mx-auto p-4">
        <header class="py-6 border-b mb-6">
            <h1 class="text-2xl font-bold text-blue-900">🏠 ระบบจัดการทรัพย์ Meesuk</h1>
        </header>

        <div id="propertyGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl max-w-lg w-full p-6 shadow-2xl overflow-y-auto max-h-[90vh]">
            <h2 class="text-xl font-bold mb-4 border-b pb-2">รายละเอียดทรัพย์</h2>
            <div id="modalContent" class="space-y-4"></div>
            <div class="mt-6 flex gap-2">
                <button onclick="saveChanges()" class="flex-1 bg-green-600 text-white py-3 rounded-xl font-bold">บันทึกการแก้ไข</button>
                <button onclick="closeModal()" class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-xl">ปิด</button>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxd-ro_qmS8olYEbbMCTAKEiqFE7egiTYCV74FF361yvpzzxvLIzicklAJ6fPyoUslz/exec";
        let currentProperties = [];
        let editingRowIndex = null;

        async function loadData() {
            const res = await fetch(WEB_APP_URL);
            currentProperties = await res.json();
            render();
        }

        function render() {
            const grid = document.getElementById('propertyGrid');
            grid.innerHTML = currentProperties.map((item, idx) => `
                <div class="bg-white p-5 rounded-3xl shadow-sm border hover:shadow-md transition cursor-pointer" onclick="openModal(${idx})">
                    <div class="flex justify-between mb-2">
                        <span class="text-xs font-bold px-2 py-1 rounded bg-blue-50 text-blue-600">${item['ประเภททรัพย์']}</span>
                        <span class="text-blue-700 font-bold">${item['ราคาขายรวม']}</span>
                    </div>
                    <h3 class="font-bold text-gray-800">${item['ชื่อทรัพย์'] || 'ไม่มีชื่อ'}</h3>
                    <p class="text-sm text-gray-500 mt-2">📍 ${item['อำเภอ']}, ${item['จังหวัด']}</p>
                    <button class="mt-4 w-full py-2 bg-slate-100 text-slate-600 rounded-xl text-sm font-medium">ดูและแก้ไข</button>
                </div>
            `).join('');
        }

        function openModal(index) {
            const prop = currentProperties[index];
            editingRowIndex = prop.row_index;
            const content = document.getElementById('modalContent');
            
            // สร้างช่องกรอกข้อมูล (เลือกเฉพาะฟิลด์สำคัญ)
            const fields = ['ชื่อทรัพย์', 'ประเภททรัพย์', 'ราคาขายรวม', 'สถานะ', 'จังหวัด'];
            content.innerHTML = fields.map(f => `
                <div>
                    <label class="text-xs text-gray-400">${f}</label>
                    <input type="text" id="edit_${f}" value="${prop[f] || ''}" class="w-full p-3 bg-gray-50 rounded-xl border-none ring-1 ring-gray-200 focus:ring-blue-500">
                </div>
            `).join('');
            
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        async function saveChanges() {
            const updates = {};
            ['ชื่อทรัพย์', 'ประเภททรัพย์', 'ราคาขายรวม', 'สถานะ', 'จังหวัด'].forEach(f => {
                updates[f] = document.getElementById(`edit_${f}`).value;
            });

            // ส่งข้อมูลกลับไป Google Sheets
            await fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify({ row_index: editingRowIndex, updates: updates })
            });

            alert('บันทึกสำเร็จ!');
            closeModal();
            loadData(); // รีโหลดข้อมูลใหม่
        }

        loadData();
    </script>
</body>
</html>
